<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work — SHOTARO</title>
<style>
  :root {
    --bg: #f2f2f2;
    --bg-card: #f8f8f8;
    --fg: #1a1a1a;
    --muted: #888;
    --line: #dedede;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN W3", -apple-system, sans-serif;
    line-height: 1.8;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }

  .container { max-width: 960px; margin: 0 auto; padding: 0 32px; }

  /* ========== Header ========== */
  header {
    padding: 40px 0;
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0;
    background: rgba(242,242,242,0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
    transition: padding 0.3s ease;
  }
  header.scrolled { padding: 24px 0; }
  header .container { display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 18px; font-weight: 500; letter-spacing: 0.15em; }
  header nav { display: flex; gap: 32px; align-items: center; }
  header nav a { font-size: 13px; color: var(--muted); transition: color .2s; }
  header nav a:hover { color: var(--fg); }

  /* ========== Back ========== */
  .back-bar { padding: 32px 0 0; }
  .back-bar a {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; letter-spacing: 0.1em; color: var(--muted);
    transition: color 0.2s;
  }
  .back-bar a:hover { color: var(--fg); }

  /* ========== Hero ========== */
  .work-hero { padding: 40px 0 56px; border-bottom: 1px solid var(--line); }
  .work-meta { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .work-cat {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); border: 1px solid var(--line);
    padding: 4px 12px;
  }
  .work-year { font-size: 13px; color: var(--muted); }
  .work-hero h2 { font-size: clamp(20px, 3vw, 30px); font-weight: 500; line-height: 1.5; letter-spacing: 0.02em; }

  /* ========== Video ========== */
  .work-video { padding: 56px 0; border-bottom: 1px solid var(--line); }
  .video-wrap {
    position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;
    background: #000;
  }
  .video-wrap iframe {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; border: none;
  }

  /* ========== Description ========== */
  .work-desc { padding: 56px 0; border-bottom: 1px solid var(--line); }
  .section-label {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); font-weight: 500; margin-bottom: 24px;
  }
  .work-desc p { font-size: 15px; line-height: 2; color: var(--fg); max-width: 640px; white-space: pre-line; }

  /* ========== Credits ========== */
  .work-credits { padding: 56px 0 80px; }
  .credits-list { margin-top: 0; }
  .credit-row {
    display: grid; grid-template-columns: 160px 1fr;
    gap: 16px; padding: 16px 0;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
  }
  .credit-row:first-child { border-top: 1px solid var(--line); }
  .credit-role { color: var(--muted); letter-spacing: 0.05em; }
  .credit-name { font-weight: 500; }

  /* ========== Footer ========== */
  footer {
    border-top: 1px solid var(--line);
    padding: 32px 0;
  }
  footer .container { display: flex; justify-content: space-between; align-items: center; }
  footer div { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; }

  /* ========== Scroll Reveal (上から) ========== */
  .reveal {
    opacity: 0;
    transform: translateY(-18px);
    transition: opacity 0.55s ease, transform 0.55s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ========== Responsive ========== */
  @media (max-width: 640px) {
    .container { padding: 0 20px; }
    header { padding: 24px 0; }
    header nav { display: none; }
    .work-hero h2 { font-size: 18px; }
    .credit-row { grid-template-columns: 120px 1fr; }
  }
</style>
</head>
<body>

<header id="siteHeader">
  <div class="container">
    <h1><a href="index.html">SHOTARO</a></h1>
    <nav>
      <a href="works.html">Works</a>
      <a href="index.html#about">About</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </div>
</header>

<div class="container">
  <div class="back-bar reveal">
    <a href="works.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      Works
    </a>
  </div>
</div>

<div class="container">
  <section class="work-hero">
    <div class="work-meta reveal">
      <span class="work-cat" id="workCat"></span>
      <span class="work-year" id="workYear"></span>
    </div>
    <h2 class="reveal" id="workTitle"></h2>
  </section>
</div>

<div class="container">
  <section class="work-video reveal">
    <div class="video-wrap">
      <iframe id="workIframe" src="" allowfullscreen loading="lazy"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
      </iframe>
    </div>
  </section>
</div>

<div class="container reveal" id="descSection" style="display:none">
  <section class="work-desc">
    <div class="section-label">Description</div>
    <p id="workDesc"></p>
  </section>
</div>

<div class="container">
  <section class="work-credits reveal">
    <div class="section-label">Role</div>
    <div class="credits-list" id="creditsList"></div>
  </section>
</div>

<footer>
  <div class="container">
    <div>© 2026 SHOTARO</div>
    <div>Osaka, Japan</div>

</footer>

<script>

// ===== ページ描画 =====
const id = new URLSearchParams(window.location.search).get('id');
const work = works[id];

if (work) {
  document.title = work.title + ' — SHOTARO';
  document.getElementById('workTitle').textContent = work.title;
  document.getElementById('workCat').textContent   = work.cat;
  document.getElementById('workYear').textContent  = work.year;
  document.getElementById('workIframe').src = `https://www.youtube.com/embed/${id}?rel=0`;

  if (work.desc) {
    document.getElementById('workDesc').textContent = work.desc;
    document.getElementById('descSection').style.display = '';
  }

  const list = document.getElementById('creditsList');
  work.credits.forEach(([role, name]) => {
    const row = document.createElement('div');
    row.className = 'credit-row';
    row.innerHTML = `<span class="credit-role">${role}</span><span class="credit-name">${name}</span>`;
    list.appendChild(row);
  });
} else {
  document.querySelector('.work-hero h2').textContent = '作品が見つかりません';
}

// ===== Scroll reveal (上から) =====
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

// ===== Header scroll =====
const header = document.getElementById('siteHeader');
window.addEventListener('scroll', () => {
  header.classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });
</script>
</body>
</html>
