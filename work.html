<style>
  :root {
    --fg: #1a1a2e;
    --muted: #6a7090;
    --line: rgba(170,185,225,0.35);
    --glass: rgba(255,255,255,0.50);
    --glass-border: rgba(255,255,255,0.76);
    --blur: blur(24px) saturate(1.8);
    --shadow: 0 8px 40px rgba(50,70,180,0.10), 0 2px 10px rgba(50,70,180,0.06), inset 0 1.5px 0 rgba(255,255,255,0.88);
    --r: 20px;
    --r-sm: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: #f5f5f5;
    color: var(--fg);
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN W3", sans-serif;
    line-height: 1.8;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  .container { max-width: 1080px; margin: 0 auto; padding: 0 48px; }

  /* ===== Header ===== */
  header {
    position: sticky; top: 0; z-index: 100;
    padding: 22px 0;
    background: rgba(14,14,14,0.92);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  header .inner {
    display: flex; justify-content: space-between; align-items: center;
    max-width: 1080px; margin: 0 auto; padding: 0 48px;
  }
  header h1 { font-size: 15px; font-weight: 500; letter-spacing: 0.22em; color: #fff; }
  header nav { display: flex; align-items: center; }
  header nav a {
    font-size: 12px; letter-spacing: 0.12em; color: rgba(255,255,255,0.5);
    padding: 0 18px; position: relative; transition: color 0.2s;
  }
  header nav a:not(:last-child)::after {
    content: '/'; position: absolute; right: 0;
    top: 50%; transform: translateY(-50%);
    color: rgba(255,255,255,0.15); font-size: 11px;
  }
  header nav a:hover { color: #fff; }

  /* Hamburger */
  .hamburger {
    display: none; flex-direction: column; gap: 5px;
    cursor: pointer; background: none; border: none; padding: 4px;
  }
  .hamburger span {
    display: block; width: 22px; height: 1px; background: #fff;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

  .mobile-nav {
    display: none; position: fixed;
    top: 0; right: 0; width: 260px; height: 100dvh;
    background: rgba(9,9,20,0.82);
    backdrop-filter: blur(32px) saturate(1.6);
    -webkit-backdrop-filter: blur(32px) saturate(1.6);
    border-left: 1px solid rgba(255,255,255,0.09);
    z-index: 200; padding: 80px 40px 40px;
    flex-direction: column; gap: 32px;
    transform: translateX(100%); transition: transform 0.35s ease;
  }
  .mobile-nav.open { transform: translateX(0); }
  .mobile-nav a { font-size: 16px; color: rgba(255,255,255,0.55); letter-spacing: 0.1em; transition: color 0.2s; }
  .mobile-nav a:hover { color: #fff; }

  .mobile-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.38);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 150;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .mobile-overlay.open { opacity: 1; pointer-events: auto; }

  /* ===== Back ===== */
  .back-bar { padding: 36px 0 0; }
  .back-bar a {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); transition: color 0.2s, gap 0.2s;
  }
  .back-bar a:hover { color: var(--fg); gap: 12px; }

  /* ===== Hero ===== */
  .work-hero { padding: 40px 0 56px; border-bottom: 1px solid var(--line); }
  .work-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .work-cat {
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted);
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.78);
    border-radius: 100px;
    padding: 4px 16px;
    box-shadow: 0 2px 8px rgba(50,70,160,0.06), inset 0 1px 0 rgba(255,255,255,0.88);
  }
  .work-year { font-size: 12px; color: var(--muted); }
  .work-hero h2 {
    font-size: clamp(18px, 3vw, 30px);
    font-weight: 500; line-height: 1.5; letter-spacing: 0.02em;
  }

  /* ===== Video ===== */
  .work-video { padding: 64px 0; border-bottom: 1px solid var(--line); }
  .video-wrap {
    position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;
    background: #000;
    border-radius: var(--r);
    box-shadow: 0 16px 56px rgba(0,0,0,0.25);
  }
  .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; border-radius: var(--r); }

  /* ===== Description ===== */
  .work-desc { padding: 64px 0; border-bottom: 1px solid var(--line); }
  .section-label {
    font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 28px;
  }
  .work-desc p { font-size: 14px; line-height: 2.1; color: #4a4a6a; max-width: 640px; white-space: pre-line; }

  /* ===== Credits ===== */
  .work-credits { padding: 64px 0 100px; }
  .credit-row {
    display: grid; grid-template-columns: 160px 1fr;
    gap: 16px; padding: 16px 0;
    border-bottom: 1px solid var(--line); font-size: 14px;
  }
  .credit-row:first-child { border-top: 1px solid var(--line); }
  .credit-role { color: var(--muted); letter-spacing: 0.05em; }
  .credit-name { font-weight: 500; }

  /* ===== Desktop: Liquid Glass OFF (769px以上) ===== */
  @media (min-width: 769px) {
    .work-cat {
      background: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: 1px solid var(--line);
      border-radius: 0;
      box-shadow: none;
      padding: 4px 14px;
      color: var(--muted);
    }
    .video-wrap {
      border-radius: 0;
      box-shadow: none;
    }
    .video-wrap iframe { border-radius: 0; }
  }

  /* ===== Reveal ===== */
  .reveal {
    opacity: 0; transform: translateY(-16px);
    transition: opacity 0.55s ease, transform 0.55s ease;
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ===== Footer ===== */
  footer {
    background: #222;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 28px 0;
  }
  footer .inner {
    max-width: 1080px; margin: 0 auto; padding: 0 48px;
    display: flex; justify-content: space-between; align-items: center;
  }
  footer span { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.08em; }

  /* ===== Responsive ===== */
  @media (max-width: 640px) {
    .container { padding: 0 20px; }
    header { padding: 16px 0; }
    header .inner { padding: 0 24px; }
    header nav { display: none; }
    .hamburger { display: flex; }
    .mobile-nav { display: flex; }
    .mobile-overlay { display: block; pointer-events: none; }
    .work-hero h2 { font-size: 18px; }
    .credit-row { grid-template-columns: 120px 1fr; }
    footer .inner { flex-direction: column; gap: 8px; text-align: center; }
  }
</style>
</head>

const id   = new URLSearchParams(window.location.search).get('id');
const work = works[id];

if (work) {
  document.title = work.title + ' — SHOTARO';
  document.getElementById('workTitle').textContent = work.title;
  document.getElementById('workCat').textContent   = work.cat;
  document.getElementById('workYear').textContent  = work.year;
  document.getElementById('workIframe').src = `https://www.youtube.com/embed/${id}?rel=0`;

  if (work.desc) {
    document.getElementById('workDesc').textContent = work.desc;
    document.getElementById('descSection').style.display = '';
  }

  const list = document.getElementById('creditsList');
  work.credits.forEach(([role, name]) => {
    const row = document.createElement('div');
    row.className = 'credit-row';
    row.innerHTML = `<span class="credit-role">${role}</span><span class="credit-name">${name}</span>`;
    list.appendChild(row);
  });
} else {
  document.querySelector('.work-hero h2').textContent = '作品が見つかりません';
}

// Hamburger
const hamburger = document.getElementById('hamburger');
const mobileNav = document.getElementById('mobileNav');
const overlay   = document.getElementById('mobileOverlay');
function openMenu()  { hamburger.classList.add('open'); mobileNav.classList.add('open'); overlay.classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeMenu() { hamburger.classList.remove('open'); mobileNav.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = ''; }
hamburger.addEventListener('click', () => hamburger.classList.contains('open') ? closeMenu() : openMenu());
overlay.addEventListener('click', closeMenu);
document.querySelectorAll('.mnl').forEach(l => l.addEventListener('click', closeMenu));

// Scroll reveal
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
